<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IEP Input Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
}

.container {
  display: flex;
  width: 90%;
  margin: 50px auto;
  background: rgba(255,255,255,0.95);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* LEFT */
.left {
  width: 30%;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: white;
  text-align: center;
  padding: 30px 20px;
}

.left img {
  width: 110px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 4px solid white;
}

.detail {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
}

.btn {
  margin-top: 25px;
  padding: 12px;
  width: 100%;
  background: white;
  color: #6a11cb;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* RIGHT */
.right {
  width: 70%;
  padding: 30px 40px;
}

.tabs {
  display: flex;
  border-bottom: 2px solid #eee;
}

.tabs div {
  margin-right: 25px;
  padding: 10px;
  color: #777;
}

.active {
  color: #6a11cb;
  border-bottom: 3px solid #6a11cb;
}

.form {
  display: flex;
  flex-wrap: wrap;
  margin-top: 20px;
}

.form-group {
  width: 48%;
  margin-bottom: 18px;
}

.form-group:nth-child(odd) {
  margin-right: 4%;
}

label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

input:focus, select:focus {
  border-color: #6a11cb;
  outline: none;
}

.save-btn {
  background: linear-gradient(to right, #6a11cb, #2575fc);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  float: right;
  margin-top: 15px;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <h3>Child Profile</h3>
    <p>AI IEP Generator</p>

    <div class="detail"><span>Status</span><span>New</span></div>
    <div class="detail"><span>IEP</span><span>Pending</span></div>

    <button class="btn">Generate IEP</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    <div class="tabs">
      <div class="active">Child Info</div>
    </div>

    <div class="form">

      <div class="form-group">
        <label>Child Name</label>
        <input type="text" placeholder="Enter child name">
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number">
      </div>

      <div class="form-group">
        <label>Disability Type</label>
        <select>
          <option>Autism</option>
          <option>ADHD</option>
          <option>Down Syndrome</option>
        </select>
      </div>

      <div class="form-group">
        <label>Parent Name</label>
        <input type="text" placeholder="Enter parent name">
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter mobile number">
      </div>

    </div>

    <button class="save-btn">Save</button>

  </div>

</div>

</body>
</html>
